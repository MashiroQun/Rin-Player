<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Rin☪︎ Music Player</title>

    <link rel="icon" href="/character.png" type="image/png">
    <link rel="apple-touch-icon" href="/character.png">
    <link rel="manifest" href="/manifest.webmanifest">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="/style.css">
</head>

<body class="flex flex-col">

    <div id="splash-screen"
         class="fixed inset-0 z-[9999] flex flex-col items-center justify-center cursor-pointer"
         style="background: var(--app-bg);"
         onclick="startApp()">
        
        <div class="relative w-32 h-32 mb-8 animate-float">
            <img src="/character.png" class="w-full h-full object-cover rounded-full shadow-2xl border-[3px] border-white/10">
        </div>
        <h1 class="text-2xl font-bold tracking-[0.1em] text-white mb-4 drop-shadow-lg">Rin☪︎ Music Player</h1>
        <div class="absolute bottom-24 animate-pulse text-white/70 text-[10px] font-bold tracking-[0.2em]">- TAP TO START -</div>
    </div>

    <main class="flex-1 overflow-hidden flex flex-col">
        
        <section id="view-player" class="flex flex-col w-full h-full">
            <div class="w-full flex-shrink-0 z-20 bg-black/10 safe-top">
                <div class="w-full relative flex items-center justify-center h-16">
                    <div class="absolute -bottom-3 left-6 z-30">
                        <img src="/character.png" class="w-14 h-14 object-cover rounded-full border-[3px] shadow-xl" style="border-color: var(--app-bg);">
                    </div>
                    <h1 class="text-[16px] font-bold tracking-widest text-white/90">Rin☪︎ Music Player</h1>
                </div>
            </div>

            <div class="w-full flex-shrink-0 px-4 mt-6">
                <div class="w-full aspect-video rounded-2xl overflow-hidden bg-black/50 shadow-2xl border border-white/10 relative">
                    <div id="player" class="absolute inset-0"></div>
                </div>
                
                <div class="px-2 mt-6 mb-4">
                    <div class="flex justify-between text-[10px] text-white/50 font-mono mb-2 font-bold px-1">
                        <span id="current-time">0:00</span>
                        <span id="duration-total">0:00</span>
                    </div>
                    <input type="range" id="seek-bar" value="0" step="0.1" class="w-full">
                </div>

                <div class="flex justify-between items-center px-8 mb-6">
                    <button onclick="toggleShuffle()" id="btn-shuffle" class="text-white/40">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M16 3h5v5M4 20L21 3M21 16v5h-5M15 15l6 6M4 4l5 5"/></svg>
                    </button>
                    <div class="flex items-center gap-8">
                        <button onclick="prevVideo()" class="text-white"><svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor"><path d="M6 6h2v12H6zm3.5 6l8.5 6V6z"/></svg></button>
                        <button onclick="togglePlay()" id="play-pause-btn" class="w-12 h-12 bg-white rounded-full flex items-center justify-center text-[#2C3D85] shadow-lg">
                            <svg id="icon-play" width="24" height="24" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>
                            <svg id="icon-pause" class="hidden" width="24" height="24" viewBox="0 0 24 24" fill="currentColor"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>
                        </button>
                        <button onclick="nextVideo()" class="text-white"><svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor"><path d="M6 18l8.5-6L6 6v12zM16 6v12h2V6h-2z"/></svg></button>
                    </div>
                    <button onclick="toggleRepeat()" id="btn-repeat" class="text-white/40 relative">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M17 1l4 4-4 4M3 11V9a4 4 0 014-4h14M7 23l-4-4 4-4M21 13v2a4 4 0 01-4 4H3"/></svg>
                        <span id="repeat-1-indicator" class="hidden absolute -top-2 -right-2 text-[8px] font-bold bg-white rounded-full w-3.5 h-3.5 flex items-center justify-center text-[#2C3D85]">1</span>
                    </button>
                </div>
            </div>

            <div class="flex-1 overflow-y-auto px-4 pb-4" id="playlist-container"></div>
        </section>

        <section id="view-links" class="h-full hidden p-8 w-full"></section>
        <section id="view-edit" class="h-full hidden p-8 w-full"></section>

    </main>

    <nav class="flex-shrink-0 w-full bg-black/20 border-t border-white/5 safe-bottom z-50">
        <div class="flex justify-around items-center h-16 max-w-md mx-auto px-6">
            <button onclick="switchTab('player')" id="nav-player" class="nav-btn text-white">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 18V5l12-2v13"/><circle cx="6" cy="18" r="3"/><circle cx="18" cy="16" r="3"/></svg>
            </button>
            <button onclick="switchTab('links')" id="nav-links" class="nav-btn text-white/30">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/></svg>
            </button>
            <button onclick="switchTab('edit')" id="nav-edit" class="nav-btn text-white/30">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 3a2.828 2.828 0 1 1 4 4L7.5 20.5 2 22l1.5-5.5L17 3z"/></svg>
            </button>
        </div>
    </nav>

    <script>
        const MY_API_KEY = "AIzaSyBQ5nPI4F-ATGGHXi5CmjAUCmpf05KPpZU"; 
        const TARGET_HANDLE = 'r_____in__'; // @無しの方が安定します
        const CACHE_KEY = 'video_cache_v7';
        let player, playlist = [], currentIndex = 0, isShuffle = false, repeatMode = 0, appStarted = false;

        const tag = document.createElement('script');
        tag.src = "https://www.youtube.com/iframe_api";
        document.head.appendChild(tag);

        function onYouTubeIframeAPIReady() {
            player = new YT.Player('player', {
                height: '100%', width: '100%', videoId: '',
                playerVars: { 'playsinline': 1, 'controls': 0, 'modestbranding': 1, 'rel': 0 },
                events: { 'onStateChange': onPlayerStateChange }
            });
        }

        async function startApp() {
            if(appStarted) return;
            appStarted = true;

            const splash = document.getElementById('splash-screen');
            splash.classList.add('splash-fade-out');
            setTimeout(() => { splash.style.display = 'none'; }, 600);
            
            checkAndFetchList(MY_API_KEY).catch(e => console.error("Load failed", e));
        }

        function switchTab(tabId) {
            ['player', 'links', 'edit'].forEach(id => {
                document.getElementById('view-' + id).classList.add('hidden');
                const navBtn = document.getElementById('nav-' + id);
                if(navBtn) navBtn.classList.replace('text-white', 'text-white/30');
            });
            document.getElementById('view-' + tabId).classList.remove('hidden');
            document.getElementById('nav-' + tabId).classList.replace('text-white/30', 'text-white');
        }

        async function checkAndFetchList(apiKey) {
            const cached = localStorage.getItem(CACHE_KEY);
            const last = localStorage.getItem('last_fetch_time');
            if (cached && last && (Date.now() - last < 86400000)) {
                playlist = JSON.parse(cached);
                renderPlaylist();
                if(playlist.length > 0) playAt(0, false);
            } else {
                await fetchFullPlaylist(apiKey);
            }
        }

        async function fetchFullPlaylist(apiKey) {
            try {
                const chRes = await fetch(`https://www.googleapis.com/youtube/v3/channels?part=contentDetails&forHandle=${TARGET_HANDLE}&key=${apiKey}`);
                const chData = await chRes.json();
                const uploadsId = chData.items[0].contentDetails.relatedPlaylists.uploads;

                const plRes = await fetch(`https://www.googleapis.com/youtube/v3/playlistItems?part=snippet,contentDetails&maxResults=50&playlistId=${uploadsId}&key=${apiKey}`);
                const plData = await plRes.json();
                const vIds = plData.items.map(i => i.contentDetails.videoId).join(',');

                const vRes = await fetch(`https://www.googleapis.com/youtube/v3/videos?part=contentDetails,snippet&id=${vIds}&key=${apiKey}`);
                const vData = await vRes.json();

                playlist = vData.items.map(v => ({
                    id: v.id, title: v.snippet.title, thumb: v.snippet.thumbnails.medium.url,
                    duration: parseISO8601(v.contentDetails.duration)
                }));

                localStorage.setItem(CACHE_KEY, JSON.stringify(playlist));
                localStorage.setItem('last_fetch_time', Date.now());
                renderPlaylist();
                if(playlist.length > 0) playAt(0, false);
            } catch (e) { console.error("API Error", e); }
        }

        function renderPlaylist() {
            const container = document.getElementById('playlist-container');
            container.innerHTML = playlist.map((item, i) => `
                <div id="track-${i}" onclick="playAt(${i})" class="flex items-center gap-4 mb-3 p-4 rounded-2xl active:scale-[0.98] transition-all cursor-pointer ${i === currentIndex ? 'bg-white/10' : 'bg-white/5'}">
                    <img src="${item.thumb}" class="w-24 aspect-video object-cover rounded-xl shadow-lg">
                    <div class="flex-1 min-w-0">
                        <div class="text-[13px] font-bold truncate ${i === currentIndex ? 'text-white' : 'text-white/60'}">${item.title}</div>
                        <div class="text-[9px] text-white/30 mt-1 font-bold tracking-widest uppercase">Track ${i+1} • ${item.duration}</div>
                    </div>
                </div>
            `).join('');
        }

        function playAt(i, auto = true) {
            if(!player || !player.loadVideoById) return;
            currentIndex = i;
            if(auto) player.loadVideoById(playlist[i].id);
            else player.cueVideoById(playlist[i].id);
            renderPlaylist();
            setTimeout(() => {
                const el = document.getElementById('track-' + i);
                if(el) el.scrollIntoView({ behavior: 'smooth', block: 'center' });
            }, 300);
        }

        function togglePlay() { player.getPlayerState() === 1 ? player.pauseVideo() : player.playVideo(); }
        function nextVideo() { currentIndex = (currentIndex + 1) % playlist.length; playAt(currentIndex); }
        function prevVideo() { currentIndex = (currentIndex - 1 + playlist.length) % playlist.length; playAt(currentIndex); }

        function onPlayerStateChange(e) {
            const iconPlay = document.getElementById('icon-play');
            const iconPause = document.getElementById('icon-pause');
            if (e.data === 1) { iconPlay.classList.add('hidden'); iconPause.classList.remove('hidden'); updateTick(); }
            else { iconPlay.classList.remove('hidden'); iconPause.classList.add('hidden'); }
            if (e.data === 0) nextVideo();
        }

        function updateTick() {
            const loop = setInterval(() => {
                if (player.getPlayerState() !== 1) return clearInterval(loop);
                const curr = player.getCurrentTime(), total = player.getDuration();
                document.getElementById('current-time').innerText = formatSeconds(curr);
                document.getElementById('duration-total').innerText = formatSeconds(total);
                document.getElementById('seek-bar').value = (curr / total) * 100 || 0;
            }, 500);
        }

        function formatSeconds(sec) {
            const m = Math.floor(sec / 60), s = Math.floor(sec % 60);
            return `${m}:${s.toString().padStart(2, '0')}`;
        }

        function parseISO8601(d) {
            const m = d.match(/PT(?:(\d+)H)?(?:(\d+)M)?(?:(\d+)S)?/);
            return formatSeconds(parseInt(m[1]||0)*3600 + parseInt(m[2]||0)*60 + parseInt(m[3]||0));
        }

        document.getElementById('seek-bar').addEventListener('input', function() {
            if(player && player.getDuration) player.seekTo(player.getDuration() * (this.value / 100));
        });
    </script>
</body>
</html>
