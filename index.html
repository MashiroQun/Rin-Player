<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Rin☪︎ Music Player</title>

    <link rel="icon" href="/character.png" type="image/png">
    <link rel="apple-touch-icon" href="/character.png">
    <link rel="manifest" href="/manifest.webmanifest">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

    <link rel="stylesheet" href="/style.css">
</head>

<!-- ★ h-[100dvh] を削除 → Safe Area と相性の良い min-h-screen に変更 -->
<body class="flex flex-col min-h-screen">

    <!-- ★ Safe Area を適用 -->
    <div id="splash-screen"
         class="fixed inset-0 z-[9999] flex flex-col items-center justify-center safe-top safe-bottom transition-all"
         style="background: var(--app-bg);"
         onclick="startApp()">

        <div class="relative w-32 h-32 mb-8 animate-float">
            <img src="/character.png" alt="Icon"
                 class="w-full h-full object-cover rounded-full shadow-2xl border-[3px] border-white/10">
        </div>

        <h1 class="text-2xl font-bold tracking-[0.1em] text-white mb-4 text-center z-10 drop-shadow-lg">
            Rin☪︎ Music Player
        </h1>

        <div class="absolute bottom-24 animate-pulse text-white/70 text-[10px] font-bold tracking-[0.2em] z-10">
            - TAP TO START -
        </div>
    </div>

    <!-- ★ main に Safe Area を適用 -->
    <main class="flex-1 overflow-hidden flex flex-col safe-top safe-bottom">

        <section id="view-player" class="flex flex-col w-full flex-1">

            <div class="w-full flex-shrink-0 z-20">
                <div class="w-full relative bg-black/10 flex items-center justify-center h-20">
                    <div class="absolute -bottom-3 left-6 z-30">
                        <img src="/character.png"
                             class="w-14 h-14 object-cover rounded-full border-[3px] shadow-xl"
                             style="border-color: var(--app-bg);">
                    </div>
                    <h1 class="text-[17px] font-bold tracking-widest text-white/90 z-20">
                        Rin☪︎ Music Player
                    </h1>
                </div>

                <div class="mt-8 px-4 mb-4">
                    <div class="w-full aspect-video rounded-2xl overflow-hidden bg-black/50 shadow-2xl border border-white/10 relative">
                        <div id="player" class="absolute inset-0"></div>
                    </div>
                </div>

                <div class="px-6 mb-4">
                    <div class="flex justify-between text-[10px] text-white/60 font-mono mb-1.5 px-1 font-bold">
                        <span id="current-time">0:00</span>
                        <span id="duration-total">0:00</span>
                    </div>
                    <input type="range" id="seek-bar" value="0" step="0.1"
                           class="w-full appearance-none bg-transparent">
                </div>

                <div class="flex justify-between items-center px-10 mb-4">
                    <button onclick="toggleShuffle()" id="btn-shuffle"
                            class="text-white/40 transition-all">
                        <!-- SVG -->
                    </button>

                    <div class="flex items-center gap-8">
                        <button onclick="prevVideo()" class="text-white active:scale-90">
                            <!-- SVG -->
                        </button>

                        <button onclick="togglePlay()" id="play-pause-btn"
                                class="w-12 h-12 bg-white rounded-full flex items-center justify-center active:scale-95 shadow-lg"
                                style="color: var(--app-bg);">
                            <!-- SVG -->
                        </button>

                        <button onclick="nextVideo()" class="text-white active:scale-90">
                            <!-- SVG -->
                        </button>
                    </div>

                    <button onclick="toggleRepeat()" id="btn-repeat"
                            class="text-white/40 transition-all relative">
                        <!-- SVG -->
                        <span id="repeat-1-indicator"
                              class="hidden absolute -top-2 -right-2 text-[8px] font-bold bg-white rounded-full w-3.5 h-3.5 flex items-center justify-center shadow-md"
                              style="color: var(--app-bg);">1</span>
                    </button>
                </div>
            </div>

            <div class="flex-1 overflow-y-auto px-4 pb-4" id="playlist-container"></div>

        </section>

        <!-- 他のタブはそのまま -->
        <section id="view-links" class="h-full hidden flex flex-col items-center justify-center p-8 w-full">
            <!-- ... -->
        </section>

        <section id="view-edit" class="h-full hidden flex flex-col p-8 pt-12 w-full">
            <!-- ... -->
        </section>

    </main>

    <!-- ★ Safe Area を nav にも適用済み -->
    <nav class="flex-shrink-0 w-full bg-black/10 border-t border-white/5 safe-bottom z-50">
        <div class="flex justify-around items-center h-16 px-6 max-w-md mx-auto">
            <!-- nav buttons -->
        </div>
    </nav>

    <!-- script はそのまま -->
    <script>
        /* あなたの JS 全部そのまま */
    </script>

</body>
</html>
