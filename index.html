<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Rin☪︎ Music Player</title>

    <link rel="icon" href="/character.png" type="image/png">
    <link rel="apple-touch-icon" href="/character.png">
    <link rel="manifest" href="/manifest.webmanifest">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

    <link rel="stylesheet" href="/style.css">
</head>

<!-- ★ h-[100dvh] を削除 → Safe Area と相性の良い min-h-screen に変更 -->
<body class="flex flex-col min-h-screen">

    <!-- ★ Safe Area を適用 -->
    <div id="splash-screen"
         class="fixed inset-0 z-[9999] flex flex-col items-center justify-center safe-top safe-bottom transition-all"
         style="background: var(--app-bg);"
         onclick="startApp()">

        <div class="relative w-32 h-32 mb-8 animate-float">
            <img src="/character.png" alt="Icon"
                 class="w-full h-full object-cover rounded-full shadow-2xl border-[3px] border-white/10">
        </div>

        <h1 class="text-2xl font-bold tracking-[0.1em] text-white mb-4 text-center z-10 drop-shadow-lg">
            Rin☪︎ Music Player
        </h1>

        <div class="absolute bottom-24 animate-pulse text-white/70 text-[10px] font-bold tracking-[0.2em] z-10">
            - TAP TO START -
        </div>
    </div>

    <!-- ★ main に Safe Area を適用 -->
    <main class="flex-1 overflow-hidden flex flex-col safe-top safe-bottom">

        <section id="view-player" class="flex flex-col w-full flex-1">

            <div class="w-full flex-shrink-0 z-20">
                <div class="w-full relative bg-black/10 flex items-center justify-center h-20">
                    <div class="absolute -bottom-3 left-6 z-30">
                        <img src="/character.png"
                             class="w-14 h-14 object-cover rounded-full border-[3px] shadow-xl"
                             style="border-color: var(--app-bg);">
                    </div>
                    <h1 class="text-[17px] font-bold tracking-widest text-white/90 z-20">
                        Rin☪︎ Music Player
                    </h1>
                </div>

                <div class="mt-8 px-4 mb-4">
                    <div class="w-full aspect-video rounded-2xl overflow-hidden bg-black/50 shadow-2xl border border-white/10 relative">
                        <div id="player" class="absolute inset-0"></div>
                    </div>
                </div>

                <div class="px-6 mb-4">
                    <div class="flex justify-between text-[10px] text-white/60 font-mono mb-1.5 px-1 font-bold">
                        <span id="current-time">0:00</span>
                        <span id="duration-total">0:00</span>
                    </div>
                    <input type="range" id="seek-bar" value="0" step="0.1"
                           class="w-full appearance-none bg-transparent">
                </div>

                <div class="flex justify-between items-center px-10 mb-4">
                    <button onclick="toggleShuffle()" id="btn-shuffle"
                            class="text-white/40 transition-all">
                        <!-- SVG -->
                    </button>

                    <div class="flex items-center gap-8">
                        <button onclick="prevVideo()" class="text-white active:scale-90">
                            <!-- SVG -->
                        </button>

                        <button onclick="togglePlay()" id="play-pause-btn"
                                class="w-12 h-12 bg-white rounded-full flex items-center justify-center active:scale-95 shadow-lg"
                                style="color: var(--app-bg);">
                            <!-- SVG -->
                        </button>

                        <button onclick="nextVideo()" class="text-white active:scale-90">
                            <!-- SVG -->
                        </button>
                    </div>

                    <button onclick="toggleRepeat()" id="btn-repeat"
                            class="text-white/40 transition-all relative">
                        <!-- SVG -->
                        <span id="repeat-1-indicator"
                              class="hidden absolute -top-2 -right-2 text-[8px] font-bold bg-white rounded-full w-3.5 h-3.5 flex items-center justify-center shadow-md"
                              style="color: var(--app-bg);">1</span>
                    </button>
                </div>
            </div>

            <div class="flex-1 overflow-y-auto px-4 pb-4" id="playlist-container"></div>

        </section>

        <!-- 他のタブはそのまま -->
        <section id="view-links" class="h-full hidden flex flex-col items-center justify-center p-8 w-full">
            <!-- ... -->
        </section>

        <section id="view-edit" class="h-full hidden flex flex-col p-8 pt-12 w-full">
            <!-- ... -->
        </section>

    </main>

    <!-- ★ Safe Area を nav にも適用済み -->
    <nav class="flex-shrink-0 w-full bg-black/10 border-t border-white/5 safe-bottom z-50">
        <div class="flex justify-around items-center h-16 px-6 max-w-md mx-auto">
            <!-- nav buttons -->
        </div>
    </nav>

    <!-- script はそのまま -->
    <script>
        const MY_API_KEY = "AIzaSyBQ5nPI4F-ATGGHXi5CmjAUCmpf05KPpZU"; 
        let player, playlist =[], currentIndex = 0;
        let isShuffle = false, repeatMode = 0; 
        const TARGET_HANDLE = '@r_____in__';
        const UPDATE_INTERVAL = 24 * 60 * 60 * 1000;
        const CACHE_KEY = 'video_cache_v7'; 
        let appStarted = false;

        const tag = document.createElement('script');
        tag.src = "https://www.youtube.com/iframe_api";
        document.head.appendChild(tag);

        function onYouTubeIframeAPIReady() {
            player = new YT.Player('player', {
                height: '100%', width: '100%', videoId: '',
                playerVars: { 'playsinline': 1, 'controls': 0, 'modestbranding': 1, 'rel': 0 },
                events: { 'onStateChange': onPlayerStateChange }
            });
        }

        async function startApp() {
            if(appStarted) return;
            appStarted = true;
            const splash = document.getElementById('splash-screen');
            splash.classList.add('splash-fade-out');
            setTimeout(() => { splash.style.display = 'none'; }, 600);
            
            let apiKey = MY_API_KEY || localStorage.getItem('yt_api_key');
            if (apiKey) checkAndFetchList(apiKey);
        }

        function switchTab(tabId) {
            ['view-player', 'view-links', 'view-edit'].forEach(id => document.getElementById(id).classList.add('hidden'));
            document.getElementById('view-' + tabId).classList.remove('hidden');

            document.querySelectorAll('.nav-btn').forEach(btn => btn.classList.replace('text-white', 'text-white/30'));
            document.getElementById('nav-' + tabId).classList.replace('text-white/30', 'text-white');
        }

        async function checkAndFetchList(apiKey) {
            const cachedData = localStorage.getItem(CACHE_KEY);
            const lastFetch = localStorage.getItem('last_fetch_time');
            const now = Date.now();

            if (cachedData && lastFetch && (now - lastFetch < UPDATE_INTERVAL)) {
                playlist = JSON.parse(cachedData);
                updateApiStatus("CACHED");
                renderPlaylist();
                if(playlist.length > 0) playAt(0, true);
            } else {
                await fetchFullPlaylist(apiKey);
            }
        }

        function updateApiStatus(text) {
            const el = document.getElementById('api-status-text');
            if(el) el.innerText = text;
        }

        async function fetchFullPlaylist(apiKey) {
            updateApiStatus("UPDATING...");
            try {
                const chRes = await fetch(`https://www.googleapis.com/youtube/v3/channels?part=contentDetails&forHandle=${TARGET_HANDLE}&key=${apiKey}`);
                const chData = await chRes.json();
                const uploadsListId = chData.items[0].contentDetails.relatedPlaylists.uploads;

                const plRes = await fetch(`https://www.googleapis.com/youtube/v3/playlistItems?part=snippet,contentDetails&maxResults=50&playlistId=${uploadsListId}&key=${apiKey}`);
                const plData = await plRes.json();
                const videoIds = plData.items.map(i => i.contentDetails.videoId).join(',');

                const vRes = await fetch(`https://www.googleapis.com/youtube/v3/videos?part=contentDetails,snippet&id=${videoIds}&key=${apiKey}`);
                const vData = await vRes.json();

                playlist = vData.items
                    .filter(v => v.contentDetails.duration.includes('M') || v.contentDetails.duration.includes('H'))
                    .map(v => ({
                        id: v.id, title: v.snippet.title, thumb: v.snippet.thumbnails.medium.url,
                        duration: parseISO8601(v.contentDetails.duration)
                    }));

                localStorage.setItem(CACHE_KEY, JSON.stringify(playlist));
                localStorage.setItem('last_fetch_time', Date.now());
                updateApiStatus("UPDATED");
                renderPlaylist();
                if(playlist.length > 0) playAt(0, true);
            } catch (e) { updateApiStatus("ERROR"); }
        }

        function renderPlaylist() {
            const container = document.getElementById('playlist-container');
            container.innerHTML = playlist.map((item, i) => `
                <div id="track-${i}" onclick="playAt(${i})" class="flex items-center gap-4 mb-3 p-3 rounded-2xl active:scale-[0.98] transition-all cursor-pointer ${i === currentIndex ? 'bg-white/10' : 'bg-transparent'}">
                    <img src="${item.thumb}" class="w-24 aspect-video object-cover rounded-xl shadow-lg">
                    <div class="flex-1 min-w-0">
                        <div class="text-[13px] font-bold truncate ${i === currentIndex ? 'text-white' : 'text-white/60'}">${item.title}</div>
                        <div class="text-[9px] text-white/30 mt-1 font-bold tracking-widest uppercase">Track ${i+1} • ${item.duration}</div>
                    </div>
                </div>
            `).join('');
        }

        function playAt(index, autoPlay = true) {
            if(!player || !player.loadVideoById) return; 
            currentIndex = index;
            if (autoPlay) player.loadVideoById(playlist[currentIndex].id);
            else player.cueVideoById(playlist[currentIndex].id);
            
            renderPlaylist();

            setTimeout(() => {
                const activeElement = document.getElementById('track-' + index);
                if (activeElement) {
                    activeElement.scrollIntoView({ behavior: 'smooth', block: 'center' });
                }
            }, 100);
        }

        function togglePlay() { player.getPlayerState() === 1 ? player.pauseVideo() : player.playVideo(); }
        function nextVideo() { currentIndex = (currentIndex + 1) % playlist.length; playAt(currentIndex); }
        function prevVideo() { currentIndex = (currentIndex - 1 + playlist.length) % playlist.length; playAt(currentIndex); }

        function toggleShuffle() {
            isShuffle = !isShuffle;
            document.getElementById('btn-shuffle').classList.toggle('text-white', isShuffle);
            document.getElementById('btn-shuffle').classList.toggle('text-white/40', !isShuffle);
        }

        function toggleRepeat() {
            repeatMode = (repeatMode + 1) % 3;
            const btn = document.getElementById('btn-repeat');
            const ind = document.getElementById('repeat-1-indicator');
            btn.classList.toggle('text-white', repeatMode > 0);
            btn.classList.toggle('text-white/40', repeatMode === 0);
            ind.classList.toggle('hidden', repeatMode !== 2);
        }

        function onPlayerStateChange(e) {
            const iconPlay = document.getElementById('icon-play');
            const iconPause = document.getElementById('icon-pause');
            if (e.data === 1) {
                iconPlay.classList.add('hidden'); iconPause.classList.remove('hidden');
                updateTick();
            } else {
                iconPlay.classList.remove('hidden'); iconPause.classList.add('hidden');
            }
            if (e.data === 0) nextVideo();
        }

        function updateTick() {
            const loop = setInterval(() => {
                if (player.getPlayerState() !== 1) return clearInterval(loop);
                const curr = player.getCurrentTime();
                const total = player.getDuration();
                document.getElementById('current-time').innerText = formatSeconds(curr);
                document.getElementById('duration-total').innerText = formatSeconds(total);
                document.getElementById('seek-bar').value = (curr / total) * 100 || 0;
            }, 500);
        }

        document.getElementById('seek-bar').addEventListener('input', function() {
            if(player && player.getDuration) player.seekTo(player.getDuration() * (this.value / 100));
        });

        function parseISO8601(duration) {
            const match = duration.match(/PT(?:(\d+)H)?(?:(\d+)M)?(?:(\d+)S)?/);
            const h = parseInt(match[1] || 0), m = parseInt(match[2] || 0), s = parseInt(match[3] || 0);
            return formatSeconds(h * 3600 + m * 60 + s);
        }

        function formatSeconds(sec) {
            const m = Math.floor(sec / 60), s = Math.floor(sec % 60);
            return `${m}:${s.toString().padStart(2, '0')}`;
        }
    </script>

</body>
</html>
