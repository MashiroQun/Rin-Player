<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#1f2b5e">
    <title>Rin☪︎ Music Player</title>

    <link rel="icon" href="/character.png" type="image/png">
    <link rel="apple-touch-icon" href="/character.png">
    <link rel="manifest" href="/manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-[#0b1024] h-dvh w-full overflow-hidden flex items-center justify-center overscroll-none select-none">

    <!-- 画面回転警告（スマホ・タブレット横向き時） -->
    <div id="orientation-msg" class="hidden fixed inset-0 z-[99999] bg-[#1f2b5e] flex-col items-center justify-center text-white p-6 text-center">
        <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="mb-4 opacity-70"><rect x="5" y="2" width="14" height="20" rx="2" ry="2"></rect><line x1="12" y1="18" x2="12.01" y2="18"></line></svg>
        <p class="font-bold tracking-widest text-lg">画面を縦向きにして<br>お使いください</p>
    </div>

    <!-- アプリコンテナ（PCでは中央配置、スマホでは全画面） -->
    <div id="app-container" class="w-full h-dvh max-h-[950px] max-w-[430px] bg-[#1f2b5e] flex flex-col relative md:rounded-3xl md:border md:border-white/10 shadow-2xl overflow-hidden">
        
        <!-- スプラッシュスクリーン -->
        <div id="splash-screen" class="absolute inset-0 z-[9999] flex flex-col items-center justify-center bg-[#1f2b5e] cursor-pointer" onclick="startApp()">
            <div class="relative w-36 h-36 mb-10 animate-float-large">
                <img src="/character.png" class="w-full h-full object-cover rounded-full z-10 border-[3px] border-white/10 shadow-2xl">
                <div class="absolute inset-0 rounded-full icon-glow"></div>
            </div>
            <h1 class="text-xl font-bold tracking-[0.1em] text-white mb-4 drop-shadow-lg text-center">Rin☪︎ Music Player</h1>
            <div class="absolute bottom-32 animate-pulse text-white/70 text-[10px] font-bold tracking-[0.2em]">- TAP TO START -</div>
        </div>

        <!-- ビュー切り替えエリア (Flexboxで伸び縮みを管理) -->
        <main class="flex-1 w-full relative overflow-hidden flex flex-col min-h-0 bg-[#2b3978]">
            
            <!-- PLAYER VIEW -->
            <section id="view-player" class="flex flex-col w-full h-full">
                <div class="w-full flex-shrink-0 bg-[#1f2b5e] safe-top pb-2 border-b border-white/5 relative z-20 shadow-sm">
                    <div class="relative flex items-center justify-center h-14">
                        <div class="absolute bottom-0 translate-y-1/4 left-4 z-30"><img src="/character.png" class="w-16 h-16 object-cover rounded-full border-[3px] shadow-xl" style="border-color: #1f2b5e;"></div>
                        <div class="flex items-center gap-2 z-20">
                            <svg width="17" height="17" viewBox="0 0 24 24" fill="#3B82F6" class="drop-shadow-md"><path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/></svg>
                            <h1 class="text-[17px] font-bold tracking-widest text-white/90 -mr-[0.1em]">Rin☪︎ Music Player</h1>
                            <svg width="17" height="17" viewBox="0 0 24 24" fill="#3B82F6" class="drop-shadow-md"><path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/></svg>
                        </div>
                        <div class="absolute right-5 z-40 opacity-70">
                            <button onclick="confirmLink('https://www.youtube.com/', 'YouTube トップページ')" class="block active:scale-90 transition-transform">
                                <svg role="img" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" width="38" height="38"><title>YouTube</title><path fill="#ffffff" d="M23.498 6.186a3.016 3.016 0 0 0-2.122-2.136C19.505 3.545 12 3.545 12 3.545s-7.505 0-9.377.505A3.017 3.017 0 0 0 .502 6.186C0 8.07 0 12 0 12s0 3.93.502 5.814a3.016 3.016 0 0 0 2.122 2.136c1.871.505 9.376.505 9.376.505s7.505 0 9.377-.505a3.015 3.015 0 0 0 2.122-2.136C24 15.93 24 12 24 12s0-3.93-.502-5.814zM9.545 15.568V8.432L15.818 12l-6.273 3.568z"/></svg>
                            </button>
                        </div>
                    </div>
                </div>
                <p class="text-center text-[9px] text-white/40 font-bold tracking-widest mt-1">Powered by YouTube</p>

                <div class="mt-1 px-4 mb-4"><div class="w-full aspect-video rounded-xl overflow-hidden bg-black/50 border border-white/10 relative"><div id="player" class="absolute inset-0"></div></div></div>

                <div class="px-6 translate-y-[-8px] py-0">
                    <div class="flex justify-between text-[9px] text-white/60 font-mono -mb-1 px-1 font-bold"><span id="current-time">0:00</span><span id="duration-total">0:00</span></div>
                    <input type="range" id="seek-bar" value="0" step="0.1" class="w-full">
                </div>

                <div class="w-full flex items-center justify-center px-8 mb-2 gap-4">
                    <button onclick="openInfoModal()" class="w-20 h-12 flex flex-col items-center justify-center active:scale-95 translate-x-[-4px] translate-y-[4px]">
                        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#3B82F6" stroke-width="2"><circle cx="12" cy="12" r="10"></circle><line x1="12" y1="16" x2="12" y2="12"></line><circle cx="12" cy="9.5" r="0.5" fill="#3B82F6" stroke="#3B82F6" stroke-width="1.5"></circle></svg>
                        <span class="text-[7px] font-bold mt-1 uppercase tracking-tighter text-blue-400">Credit</span>
                    </button>
                    <div class="flex items-center justify-center gap-6 flex-1 max-w-[200px]">
                        <button onclick="playPrev()" class="w-10 h-10 flex items-center justify-center text-white active:scale-90 transition"><svg width="22" height="22" viewBox="0 0 24 24" fill="currentColor"><path d="M6 6h2v12H6zm3.5 6l8.5 6V6z"/></svg></button>
                        <button onclick="togglePlay()" class="w-12 h-12 bg-white rounded-full flex items-center justify-center active:scale-95 shadow-lg transition" style="color: #1f2b5e;"><svg id="icon-play" width="24" height="24" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg><svg id="icon-pause" class="hidden" width="24" height="24" viewBox="0 0 24 24" fill="currentColor"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg></button>
                        <button onclick="playNext(true)" class="w-10 h-10 flex items-center justify-center text-white active:scale-90 transition"><svg width="22" height="22" viewBox="0 0 24 24" fill="currentColor"><path d="M6 18l8.5-6L6 6v12zM16 6v12h2V6h-2z"/></svg></button>
                    </div>
                    <div class="flex items-center gap-3 w-16 justify-end">
                        <button onclick="toggleRepeat()" id="btn-repeat" class="w-8 h-8 flex items-center justify-center opacity-40 text-white relative active:scale-95 transition mr-2">
                            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M17 1l4 4-4 4M3 11V9a4 4 0 014-4h14M7 23l-4-4 4-4M21 13v2a4 4 0 01-4 4H3"/></svg>
                            <span id="repeat-1-indicator" class="hidden absolute -top-1 -right-1 text-[8px] font-bold bg-[#3B82F6] text-white rounded-full w-4 h-4 flex items-center justify-center shadow-md">1</span>
                        </button>
                        <button onclick="toggleShuffle()" id="btn-shuffle" class="w-8 h-8 flex items-center justify-center opacity-40 text-white active:scale-95 transition"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M16 3h5v5M4 20L21 3M21 16v5h-5M15 15l6 6M4 4l5 5"/></svg></button>
                    </div>
                </div>

                <div class="flex-1 overflow-y-auto px-4 bg-[#374892] pt-3 pb-6 hide-scrollbar" id="playlist-container"></div>   
            </section>

            <!-- LINKS VIEW -->
            <section id="view-links" class="hidden flex-col w-full h-full bg-[#374892] relative">
                <div class="absolute inset-0 z-0 bg-cover bg-center opacity-15" style="background-image: url('/Rin.jpg');"></div>
                <div class="w-full flex-shrink-0 bg-[#1f2b5e] safe-top pb-3 border-b border-white/5 relative z-20">
                    <div class="relative flex items-center justify-center h-14">
                        <div class="absolute bottom-0 translate-y-1/4 left-6 z-30"><img src="/character.png" class="w-16 h-16 object-cover rounded-full border-[3px] shadow-xl" style="border-color: #1f2b5e;"></div>
                        <h1 class="text-[16px] font-bold tracking-widest text-white/90 z-20 uppercase">Rin's LINKS</h1>
                    </div>
                </div>

                <div class="relative z-10 flex-1 overflow-y-auto px-5 w-full flex flex-col items-center pt-12 pb-24 hide-scrollbar">
                    <div class="flex flex-col items-center mb-8">
                        <img src="/character.png" class="w-24 h-24 object-cover rounded-full border-[3px] border-white/20 shadow-xl mb-3">
                        <h2 class="text-2xl font-bold text-white tracking-widest drop-shadow-md">Rin☪︎</h2>
                        <p class="text-[13px] font-medium text-white/80 tracking-[0.2em] mt-1 drop-shadow">深音vocalist</p>
                    </div>

                    <div class="grid grid-cols-3 gap-x-3 gap-y-6 w-full max-w-[320px] pb-6">
                        <!-- X (Twitter) -->
                        <button onclick="confirmLink('https://twitter.com/r_____in__', 'X (Twitter)')" class="flex flex-col items-center w-full active:scale-90 transition-transform">
                            <div class="w-[72px] h-[72px] flex items-center justify-center bg-white/5 backdrop-blur-md rounded-2xl border border-white/10 shadow-lg mb-2 relative overflow-hidden group"><div class="absolute inset-0 bg-white/0 group-active:bg-white/10 transition-colors"></div><svg width="30" height="30" viewBox="0 0 24 24" fill="currentColor" class="text-white drop-shadow-md"><path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-5.214-6.817L4.99 21.75H1.68l7.73-8.835L1.254 2.25H8.08l4.713 6.231zm-1.161 17.52h1.833L7.084 4.126H5.117z"/></svg></div>
                            <span class="font-bold text-white/90 text-[10px] tracking-wider drop-shadow-md">X</span>
                        </button>
                        <!-- YouTube -->
                        <button onclick="confirmLink('https://www.youtube.com/@r_____in__', 'YouTube')" class="flex flex-col items-center w-full active:scale-90 transition-transform">
                            <div class="w-[72px] h-[72px] flex items-center justify-center bg-white/5 backdrop-blur-md rounded-2xl border border-white/10 shadow-lg mb-2 relative overflow-hidden group"><div class="absolute inset-0 bg-white/0 group-active:bg-white/10 transition-colors"></div><svg width="32" height="32" viewBox="0 0 24 24" fill="currentColor" class="text-white drop-shadow-md"><path d="M23.498 6.186a3.016 3.016 0 0 0-2.122-2.136C19.505 3.545 12 3.545 12 3.545s-7.505 0-9.377.505A3.017 3.017 0 0 0 .502 6.186C0 8.07 0 12 0 12s0 3.93.502 5.814a3.016 3.016 0 0 0 2.122 2.136c1.871.505 9.376.505 9.376.505s7.505 0 9.377-.505a3.015 3.015 0 0 0 2.122-2.136C24 15.93 24 12 24 12s0-3.93-.502-5.814zM9.545 15.568V8.432L15.818 12l-6.273 3.568z"/></svg></div>
                            <span class="font-bold text-white/90 text-[10px] tracking-wider drop-shadow-md">YouTube</span>
                        </button>
                        <!-- ツイキャス -->
                        <button onclick="confirmLink('#', 'ツイキャス')" class="flex flex-col items-center w-full active:scale-90 transition-transform">
                            <div class="w-[72px] h-[72px] flex items-center justify-center bg-white/5 backdrop-blur-md rounded-2xl border border-white/10 shadow-lg mb-2 relative overflow-hidden group"><div class="absolute inset-0 bg-white/0 group-active:bg-white/10 transition-colors"></div><svg width="30" height="30" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="drop-shadow-md"><path d="M12 2a3 3 0 0 0-3 3v7a3 3 0 0 0 6 0V5a3 3 0 0 0-3-3Z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" y1="19" x2="12" y2="22"/></svg></div>
                            <span class="font-bold text-white/90 text-[9px] tracking-wider drop-shadow-md">ツイキャス</span>
                        </button>
                        <!-- ニコニコ動画 -->
                        <button onclick="confirmLink('#', 'ニコニコ動画')" class="flex flex-col items-center w-full active:scale-90 transition-transform">
                            <div class="w-[72px] h-[72px] flex items-center justify-center bg-white/5 backdrop-blur-md rounded-2xl border border-white/10 shadow-lg mb-2 relative overflow-hidden group"><div class="absolute inset-0 bg-white/0 group-active:bg-white/10 transition-colors"></div><svg width="30" height="30" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="drop-shadow-md"><rect x="2" y="7" width="20" height="15" rx="2" ry="2"/><polyline points="17 2 12 7 7 2"/></svg></div>
                            <span class="font-bold text-white/90 text-[9px] tracking-wider drop-shadow-md">ニコニコ動画</span>
                        </button>
                        <!-- FANBOX -->
                        <button onclick="confirmLink('#', 'FANBOX')" class="flex flex-col items-center w-full active:scale-90 transition-transform">
                            <div class="w-[72px] h-[72px] flex items-center justify-center bg-white/5 backdrop-blur-md rounded-2xl border border-white/10 shadow-lg mb-2 relative overflow-hidden group"><div class="absolute inset-0 bg-white/0 group-active:bg-white/10 transition-colors"></div><svg width="30" height="30" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="drop-shadow-md"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"></path></svg></div>
                            <span class="font-bold text-white/90 text-[10px] tracking-wider drop-shadow-md">FANBOX</span>
                        </button>
                        <!-- BOOTH -->
                        <button onclick="confirmLink('#', 'BOOTH')" class="flex flex-col items-center w-full active:scale-90 transition-transform">
                            <div class="w-[72px] h-[72px] flex items-center justify-center bg-white/5 backdrop-blur-md rounded-2xl border border-white/10 shadow-lg mb-2 relative overflow-hidden group"><div class="absolute inset-0 bg-white/0 group-active:bg-white/10 transition-colors"></div><svg width="30" height="30" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="drop-shadow-md"><path d="M6 2L3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"></path><line x1="3" y1="6" x2="21" y2="6"></line><path d="M16 10a4 4 0 0 1-8 0"></path></svg></div>
                            <span class="font-bold text-white/90 text-[10px] tracking-wider drop-shadow-md">BOOTH</span>
                        </button>
                        <!-- WEBサイト -->
                        <button onclick="confirmLink('#', 'WEBサイト')" class="flex flex-col items-center w-full active:scale-90 transition-transform">
                            <div class="w-[72px] h-[72px] flex items-center justify-center bg-white/5 backdrop-blur-md rounded-2xl border border-white/10 shadow-lg mb-2 relative overflow-hidden group"><div class="absolute inset-0 bg-white/0 group-active:bg-white/10 transition-colors"></div><svg width="30" height="30" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="drop-shadow-md"><circle cx="12" cy="12" r="10"></circle><line x1="2" y1="12" x2="22" y2="12"></line><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"></path></svg></div>
                            <span class="font-bold text-white/90 text-[10px] tracking-wider drop-shadow-md">WEBサイト</span>
                        </button>
                        <!-- マシュマロ -->
                        <button onclick="confirmLink('#', 'マシュマロ')" class="flex flex-col items-center w-full active:scale-90 transition-transform">
                            <div class="w-[72px] h-[72px] flex items-center justify-center bg-white/5 backdrop-blur-md rounded-2xl border border-white/10 shadow-lg mb-2 relative overflow-hidden group"><div class="absolute inset-0 bg-white/0 group-active:bg-white/10 transition-colors"></div><svg width="30" height="30" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="drop-shadow-md"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path></svg></div>
                            <span class="font-bold text-white/90 text-[10px] tracking-wider drop-shadow-md">マシュマロ</span>
                        </button>
                        <!-- Amazon欲しいものリスト -->
                        <button onclick="confirmLink('#', 'Amazon欲しいものリスト')" class="flex flex-col items-center w-full active:scale-90 transition-transform">
                            <div class="w-[72px] h-[72px] flex items-center justify-center bg-white/5 backdrop-blur-md rounded-2xl border border-white/10 shadow-lg mb-2 relative overflow-hidden group"><div class="absolute inset-0 bg-white/0 group-active:bg-white/10 transition-colors"></div><svg width="30" height="30" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="drop-shadow-md"><polyline points="20 12 20 22 4 22 4 12"></polyline><rect x="2" y="7" width="20" height="5"></rect><line x1="12" y1="22" x2="12" y2="7"></line><path d="M12 7H7.5a2.5 2.5 0 0 1 0-5C11 2 12 7 12 7z"></path><path d="M12 7h4.5a2.5 2.5 0 0 0 0-5C13 2 12 7 12 7z"></path></svg></div>
                            <span class="font-bold text-white/90 text-[9px] tracking-wider drop-shadow-md text-center leading-tight">Amazon<br>欲しいもの</span>
                        </button>
                    </div>
                </div>
            </section>

            <!-- SETTING VIEW -->
            <section id="view-edit" class="hidden flex-col w-full h-full bg-[#374892]">
                <div class="w-full flex-shrink-0 bg-[#1f2b5e] safe-top pb-2 border-b border-white/5 relative z-20 shadow-sm">
                    <div class="relative flex items-center justify-center h-14">
                        <div class="absolute bottom-0 translate-y-1/4 left-4 z-30"><img src="/character.png" class="w-16 h-16 object-cover rounded-full border-[3px]" style="border-color: #1f2b5e;"></div>
                        <h1 class="text-[16px] font-bold tracking-widest text-white/90 z-20 uppercase">App Setting</h1>
                    </div>
                </div>
                <div class="flex-1 p-6 overflow-y-auto hide-scrollbar">
                    <div class="bg-black/20 p-4 rounded-2xl border border-white/5 mb-6 mt-4">
                        <div class="text-[10px] text-white/40 mb-2 font-bold uppercase tracking-tighter">API STATUS</div>
                        <div class="text-xs font-bold text-white/90 mb-1">リスト最終更新:</div>
                        <div id="status-last-update" class="text-sm font-mono text-white/70 bg-black/30 p-2 rounded-lg">未取得</div>
                        <div class="text-[10px] text-white/40 mt-3 font-bold">※リストは毎日0:00以降に自動更新されます。</div>
                    </div>
                    
                    <div class="bg-black/20 p-4 rounded-2xl border border-white/5">
                        <label class="block text-[10px] text-white/40 mb-1 font-bold uppercase tracking-tighter">YouTube API KEY</label>
                        <p class="text-[11px] text-white/70 mb-3 font-bold">ご自分で用意したキーを登録してください。</p>
                        <div class="relative mb-4">
                            <input type="text" id="api-key-input" placeholder="AIzaSy..." class="w-full bg-black/40 text-white text-sm px-3 py-3 pr-10 rounded-xl border border-white/10 focus:outline-none focus:border-white/50 transition">
                            <button onclick="toggleApiKeyVisibility()" class="absolute right-3 top-1/2 -translate-y-1/2 text-white/40 active:text-white/80">
                                <svg id="eye-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle></svg>
                            </button>
                        </div>
                        <button onclick="saveApiKey(event)" class="w-full bg-[#0b1024] border-[2px] border-blue-300/60 hover:bg-[#121936] text-white font-bold py-3.5 rounded-2xl shadow-xl active:scale-95 transition-all tracking-widest text-[14px]">保存して適用</button>
                    </div>
                    
                    <div class="mt-8">
                        <button onclick="openEditPlaylist()" class="w-full bg-white/10 border border-white/10 p-4 rounded-2xl text-white font-bold text-sm active:bg-white/20 transition flex items-center justify-center gap-2 shadow-lg"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"></path><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"></path></svg>プレイリストを編集する</button>
                    </div>
                </div>
            </section>
        </main>

        <!-- NAVIGATION -->
        <nav class="flex-shrink-0 w-full bg-[#1f2b5e] border-t border-white/5 relative z-40 safe-bottom">
            <div class="flex justify-around items-center pt-2 pb-2">
                <button id="nav-player" onclick="switchTab('player')" class="nav-btn text-white flex flex-col items-center p-1 w-16"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 18V5l12-2v13"></path><circle cx="6" cy="18" r="3"></circle><circle cx="18" cy="16" r="3"></circle></svg><span class="text-[8px] mt-1 font-bold">PLAYER</span></button>
                <button id="nav-links" onclick="switchTab('links')" class="nav-btn text-white/30 flex flex-col items-center p-1 w-16"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"></path><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"></path></svg><span class="text-[8px] mt-1 font-bold">LINKS</span></button>
                <button id="nav-edit" onclick="switchTab('edit')" class="nav-btn text-white/30 flex flex-col items-center p-1 w-16"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"></circle><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33a1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path></svg><span class="text-[8px] mt-1 font-bold">SETTING</span></button>
            </div>
        </nav>

        <!-- OVERLAYS (プレイリスト編集・モーダル等) -->
        <section id="view-edit-list" class="hidden absolute inset-0 z-50 bg-[#1f2b5e]/80 backdrop-blur-2xl flex-col w-full h-full transform transition-transform translate-y-full">
            <div class="w-full flex-shrink-0 bg-transparent safe-top pb-2 flex items-center justify-between px-4 h-16 border-b border-white/10 relative z-20">
                <button onclick="closeEditPlaylist()" class="text-white p-2 active:opacity-50 transition-opacity"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M15 18l-6-6 6-6"/></svg></button>
                <h1 class="text-[14px] font-bold tracking-widest text-white/90 drop-shadow-md">プレイリストの編集</h1>
                <div class="w-10"></div> 
            </div>
            <div class="flex-1 overflow-y-auto p-4 pb-28 relative z-10 hide-scrollbar" id="edit-playlist-container"></div>
            <div class="absolute bottom-0 left-0 w-full p-5 safe-bottom pt-4 bg-[#1f2b5e]/80 backdrop-blur-3xl border-t border-white/10 z-30 shadow-[0_-10px_30px_rgba(0,0,0,0.5)]">
                <button onclick="saveEditedPlaylist()" class="w-full bg-[#0b1024] border-[2px] border-blue-300/60 hover:bg-[#121936] text-white font-bold py-3.5 rounded-2xl shadow-xl active:scale-95 transition-all tracking-widest text-[14px]">保存して適用</button>
            </div>
        </section>

        <!-- Info Modal -->
        <div id="info-modal" class="hidden absolute inset-0 z-[100] bg-black/50 flex flex-col items-center justify-center p-6 transition-opacity opacity-0" onclick="if(event.target === this) closeInfoModal()">
            <div class="w-full max-w-[380px] max-h-[80%] bg-[#1f2b5e]/90 backdrop-blur-lg border border-white/20 rounded-3xl flex flex-col overflow-hidden shadow-2xl transform scale-95 transition-transform" id="info-modal-box">
                <div class="bg-black/30 px-4 py-3 border-b border-white/10 flex justify-between items-center flex-shrink-0">
                    <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#3B82F6" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><line x1="12" y1="16" x2="12" y2="12"></line><line x1="12" y1="8" x2="12.01" y2="8"></line></svg>
                    <h2 class="text-[10px] font-bold text-white/90 tracking-[0.2em] uppercase">Credit Information</h2>
                    <button onclick="closeInfoModal()" class="w-8 h-8 rounded-full border-2 border-white/40 flex items-center justify-center text-white/80 active:scale-90 transition"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg></button>
                </div>
                <div id="info-modal-content" class="py-5 px-6 overflow-y-auto flex-1 text-[12px] text-white/80 leading-relaxed whitespace-pre-wrap break-words hide-scrollbar w-full"></div>
                <div class="p-4 bg-black/30 border-t border-white/10 flex-shrink-0">
                    <a id="info-modal-link" href="#" target="_blank" class="flex items-center justify-center gap-2.5 w-full bg-white/10 border border-white/20 hover:bg-white/20 text-white font-bold py-3.5 rounded-2xl transition text-[11px] tracking-wider shadow-lg">YouTubeで見る</a>
                </div>
            </div>
        </div>

        <!-- Link Modal (新規追加) -->
        <div id="link-modal" class="hidden absolute inset-0 z-[100] bg-black/60 backdrop-blur-sm flex flex-col items-center justify-center p-6 transition-opacity opacity-0" onclick="if(event.target === this) closeLinkModal()">
            <div id="link-modal-box" class="w-full max-w-[300px] bg-[#2b3978] border border-white/20 rounded-3xl p-6 text-center transform scale-95 transition-transform shadow-2xl">
                <p id="link-modal-text" class="text-sm text-white/90 mb-6 leading-relaxed tracking-wide"></p>
                <div class="flex gap-3">
                    <button onclick="closeLinkModal()" class="flex-1 py-3 rounded-xl bg-white/10 hover:bg-white/20 text-white/80 font-bold text-[12px] tracking-wider transition-colors border border-white/10">キャンセル</button>
                    <button id="link-modal-btn" class="flex-1 py-3 rounded-xl bg-[#3B82F6] hover:bg-blue-400 text-white font-bold text-[12px] tracking-wider transition-colors shadow-lg">開く</button>
                </div>
            </div>
        </div>

    </div>

    <script src="script.js"></script>
</body>
</html>
