<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Rin☪︎ Music Player</title>
    
    <link rel="icon" href="/character.png" type="image/png">
    <link rel="apple-touch-icon" href="/character.png">
    <link rel="manifest" href="/manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    
    <link rel="stylesheet" href="/style.css">
</head>
<body class="flex flex-col h-[100dvh]">

    <div id="splash-screen" class="fixed inset-0 z-[9999] flex flex-col items-center justify-center transition-all" style="background: var(--app-bg);" onclick="startApp()">
        <div class="relative w-32 h-32 mb-8 animate-float">
            <img src="/character.png" alt="Icon" class="w-full h-full object-cover rounded-full shadow-2xl border-[3px] border-white/10">
        </div>
        <h1 class="text-2xl font-bold tracking-[0.1em] text-white mb-4 text-center z-10 drop-shadow-lg">Rin☪︎ Music Player</h1>
        <div class="absolute bottom-24 animate-pulse text-white/70 text-[10px] font-bold tracking-[0.2em] z-10">
            - TAP TO START -
        </div>
    </div>

    <main class="flex-1 overflow-hidden flex flex-col">
        <section id="view-player" class="h-full flex flex-col w-full">
            <div class="w-full flex-shrink-0 z-20">
                <div class="w-full safe-top relative bg-black/10 flex items-center justify-center h-20">
                    <div class="absolute -bottom-3 left-6 z-30">
                        <img src="/character.png" class="w-14 h-14 object-cover rounded-full border-[3px] shadow-xl" style="border-color: var(--app-bg);">
                    </div>
                    <h1 class="text-[17px] font-bold tracking-widest text-white/90">Rin☪︎ Music Player</h1>
                </div>

                <div class="mt-8 px-4 mb-4">
                    <div class="w-full aspect-video rounded-2xl overflow-hidden bg-black/50 shadow-2xl border border-white/10 relative">
                        <div id="player" class="absolute inset-0"></div>
                    </div>
                </div>

                <div class="px-6 mb-4">
                    <div class="flex justify-between text-[10px] text-white/60 font-mono mb-1.5 px-1 font-bold">
                        <span id="current-time">0:00</span>
                        <span id="duration-total">0:00</span>
                    </div>
                    <input type="range" id="seek-bar" value="0" step="0.1" class="w-full appearance-none bg-transparent">
                </div>

                <div class="flex justify-between items-center px-10 mb-4">
                    <button onclick="toggleShuffle()" id="btn-shuffle" class="text-white/40 transition-all">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M16 3h5v5M4 20L21 3M21 16v5h-5M15 15l6 6M4 4l5 5"/></svg>
                    </button>
                    <div class="flex items-center gap-8">
                        <button onclick="prevVideo()" class="text-white active:scale-90"><svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor"><path d="M6 6h2v12H6zm3.5 6l8.5 6V6z"/></svg></button>
                        <button onclick="togglePlay()" id="play-pause-btn" class="w-12 h-12 bg-white rounded-full flex items-center justify-center active:scale-95 shadow-lg" style="color: var(--app-bg);">
                            <svg id="icon-play" width="24" height="24" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>
                            <svg id="icon-pause" class="hidden" width="24" height="24" viewBox="0 0 24 24" fill="currentColor"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>
                        </button>
                        <button onclick="nextVideo()" class="text-white active:scale-90"><svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor"><path d="M6 18l8.5-6L6 6v12zM16 6v12h2V6h-2z"/></svg></button>
                    </div>
                    <button onclick="toggleRepeat()" id="btn-repeat" class="text-white/40 transition-all relative">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M17 1l4 4-4 4M3 11V9a4 4 0 014-4h14M7 23l-4-4 4-4M21 13v2a4 4 0 01-4 4H3"/></svg>
                        <span id="repeat-1-indicator" class="hidden absolute -top-2 -right-2 text-[8px] font-bold bg-white rounded-full w-3.5 h-3.5 flex items-center justify-center shadow-md" style="color: var(--app-bg);">1</span>
                    </button>
                </div>
            </div>

            <div class="flex-1 overflow-y-auto px-4 pb-4" id="playlist-container"></div>
        </section>

        <section id="view-links" class="h-full hidden flex flex-col items-center justify-center p-8 w-full">...</section>
        <section id="view-edit" class="h-full hidden flex flex-col p-8 pt-12 w-full">...</section>
    </main>

    <nav class="flex-shrink-0 w-full bg-black/10 border-t border-white/5 safe-bottom z-50">
        <div class="flex justify-around items-center h-16 px-6 max-w-md mx-auto">
            <button onclick="switchTab('player')" id="nav-player" class="nav-btn text-white transition-all active:scale-95">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M9 18V5l12-2v13"/><circle cx="6" cy="18" r="3"/><circle cx="18" cy="16" r="3"/></svg>
            </button>
            <button onclick="switchTab('links')" id="nav-links" class="nav-btn text-white/30 transition-all active:scale-95">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/></svg>
            </button>
            <button onclick="switchTab('edit')" id="nav-edit" class="nav-btn text-white/30 transition-all active:scale-95">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M17 3a2.828 2.828 0 1 1 4 4L7.5 20.5 2 22l1.5-5.5L17 3z"/></svg>
            </button>
        </div>
    </nav>

    <script>
        // JS部分は元のまま（変更なし）でOK
    </script>
</body>
</html>
